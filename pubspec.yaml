name: relay
description: Relay — open-source Slack alternative Flutter client
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3

  # Realtime
  web_socket_channel: ^2.4.0

  # Offline DB
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0

  # Models (code gen)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Media
  cached_network_image: ^3.3.1
  file_picker: ^8.0.0
  image_picker: ^1.1.0

  # Push notifications
  firebase_messaging: ^14.9.1
  flutter_local_notifications: ^17.0.0

  # i18n
  intl: ^0.20.2

  # Desktop
  window_manager: ^0.3.8

  # Rich text / Markdown
  flutter_markdown: ^0.7.0

  # OAuth / external URLs
  url_launcher: ^6.2.5

  # Connectivity
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0

  # Testing
  mocktail: ^1.0.3
  golden_toolkit: ^0.15.0

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true # enables flutter_localizations code gen

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
